<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProjektLauncher</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <aside class="sidebar">
        <div id="projectList" class="project-list"></div>
        <button id="openConfigModalBtn" class="settings-fab" aria-label="Einstellungen oeffnen" title="Einstellungen">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              d="M19.14 12.94a7.99 7.99 0 0 0 .06-.94 7.99 7.99 0 0 0-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.76 7.76 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.49-.42h-3.84a.5.5 0 0 0-.49.42l-.36 2.54a7.76 7.76 0 0 0-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.84a.5.5 0 0 0 .12.64l2.03 1.58a7.99 7.99 0 0 0-.06.94c0 .32.02.63.06.94L2.83 14.52a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.5.39 1.05.71 1.63.94l.36 2.54a.5.5 0 0 0 .49.42h3.84a.5.5 0 0 0 .49-.42l.36-2.54c.58-.23 1.13-.55 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z"
            />
          </svg>
        </button>
      </aside>

      <section id="dashboard" class="dashboard">
        <div class="empty-state">
          <h2>Kein Projekt ausgewaehlt</h2>
          <p>Waehle links ein Projekt aus.</p>
        </div>
      </section>
    </main>

    <div id="configModal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-card">
        <div class="modal-actions">
          <button id="closeConfigModalBtn" aria-label="Dialog schliessen">Schliessen</button>
        </div>
        <section id="configEditor" class="config-editor"></section>
        <p id="configMeta" class="config-meta"></p>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
